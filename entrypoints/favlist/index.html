<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilibili 收藏夹</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Bilibili 收藏夹</h1>
        <div class="header-right">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input type="text" id="search-input" placeholder="搜索视频标题或作者..." />
            <button id="clear-search-btn" class="hidden" title="清除搜索">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
              </svg>
            </button>
          </div>
          <div class="header-buttons">
            <button id="export-btn" title="导出收藏夹">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
              </svg>
              <span>导出</span>
            </button>
            <button id="import-btn" title="导入收藏夹">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                <path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/>
              </svg>
              <span>导入</span>
            </button>
          </div>
        </div>
      </header>
      <div id="count-banner">
        <span id="count">0 个视频</span>
      </div>
      <div id="videos-container"></div>
      <div id="empty-state" class="hidden">
        <p>还没有收藏任何视频</p>
        <p>快去 Bilibili 收藏视频吧！</p>
      </div>
      <div id="no-results" class="hidden">
        <p>没有找到匹配的视频</p>
      </div>
    </div>
    <input type="file" id="import-file" accept=".json" style="display: none;" />
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-content" id="modal-content"></div>
        <div class="modal-buttons" id="modal-buttons"></div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
